  tone: [T-01, T-02, T-03, T-04, T-06, T-07]
  output_detail: [T-01, T-02, T-03, T-04, T-06, T-07, T-08, T-09]
  reading_strategy: [T-01, T-02, T-05, T-06, T-07]
  output_structure: [T-01, T-02, T-03, T-04, T-06, T-07, T-08, T-09]
  directory_style: [T-03, T-04, T-05, T-08, T-10]
  naming: [T-03, T-04, T-05, T-08, T-10]
  edit_strategy: [T-09, T-10]
  version_strategy: [T-05, T-09, T-10]
  cross_modal_behavior: [T-04, T-06, T-08]
